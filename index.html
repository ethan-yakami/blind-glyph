<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盲人摸字</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="problem">
        <h1>盲人摸字</h1>
        <p class="tagline">汉字，汉字，你为什么那么复杂</p>

        <section class="rules">
          <h2>📝 游戏规则</h2>
          <ul id="rulesList">
            <li>拖动探针：用鼠标拖动红色 A 点和蓝色 B 点，也可以用 WASD 精细移动 A 点。</li>
            <li>观察长度：连接线上显示“标准长度 / 命中量百分比”。</li>
            <li>长度计算：画布标准长度为 1000，线段越长，左侧数值越大。</li>
            <li>命中提示：右侧数值为 0% 到 100%，表示连线经过隐藏汉字的填充程度。</li>
            <li>猜测汉字：根据探针感知的轮廓，猜出隐藏的汉字。</li>
            <li>提交答案：本 Demo 不限制提交次数，按通关时间获得最多三星评级。</li>
          </ul>
        </section>

        <aside class="level-note" id="levelNote" hidden></aside>

        <nav class="level-buttons" id="levelButtons" aria-label="关卡选择"></nav>

        <section class="board-stage">
          <div class="board-frame">
            <canvas id="board" width="500" height="500"></canvas>
          </div>
        </section>

        <section class="readout" aria-label="扫描数据">
          <h2 id="metricLine" hidden>长度比例：0 / 0%</h2>
          <p id="levelRule" hidden></p>
          <p>评级：<strong id="rating">★★★</strong></p>
        </section>

        <section class="controls" aria-label="演示控制">
          <input id="answerInput" type="text" placeholder="输入你猜的汉字" autocomplete="off" />
          <button id="submitButton" type="button" class="primary">提交答案</button>
          <button id="resetButton" type="button" data-control="probe">重置探针</button>
          <button id="gridButton" type="button">切换网格</button>
          <button id="scanButton" type="button" data-control="record">记录扫描</button>
          <button id="undoScanButton" type="button" data-control="record">撤销一步</button>
          <button id="clearScansButton" type="button" data-control="record">清空全部</button>
          <button id="fireButton" type="button" data-control="laser" hidden>发射</button>
          <label class="check-control">
            <input id="showAnswerToggle" type="checkbox" />
            显示当前关答案
          </label>
          <div class="radar-controls" id="radarControls" hidden>
            <label>半径 <input id="radiusSlider" type="range" min="37.5" max="300" step="0.5" value="160" /></label>
            <label>转速 <input id="speedSlider" type="range" min="0" max="100" value="45" /></label>
          </div>
        </section>

        <p class="message" id="message"></p>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=final-organized-1"></script>
  </body>
</html>
